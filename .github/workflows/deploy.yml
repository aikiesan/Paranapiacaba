name: Deploy WebGIS to GitHub Pages

on:
  push:
    branches:
      - main # Dispara o workflow no push para a branch main

# Permissões necessárias para publicar no GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código fonte
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Configura a versão do Node.js
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Instala dependências
      - name: Install dependencies 🔧
        run: npm ci # ou npm install

      # 4. Build de produção do Vite
      - name: Build project 🏗️
        run: npm run build

      # 5. Deploy para a branch gh-pages
      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
